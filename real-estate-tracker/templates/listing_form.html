{% extends "base.html" %}
{% block content %}
<h2>{{ 'Edit' if listing else 'Add' }} Listing</h2>
<form method="post" class="listing-form">
  <fieldset>
    <legend>Basics</legend>
    <label>Address <input name="address" required value="{{ listing.address if listing else '' }}"></label>
    <label>Suburb <input name="suburb" required value="{{ listing.suburb if listing else '' }}"></label>
    <label>Price (display) <input name="price_text" value="{{ listing.price_text if listing else '' }}" placeholder="Offers over $1.2m"></label>
    <label>Price (numeric, for sorting) <input type="number" step="1" name="price_numeric" value="{{ listing.price_numeric if listing else '' }}"></label>
    <label>Listing URL <input name="listing_url" value="{{ listing.listing_url if listing else '' }}"></label>
  </fieldset>

  <fieldset>
    <legend>Layout</legend>
    <label>Bedrooms <input type="number" name="bedrooms" min="0" value="{{ listing.bedrooms if listing else '' }}"></label>
    <label>Bathrooms <input type="number" name="bathrooms" min="0" value="{{ listing.bathrooms if listing else '' }}"></label>
    <label>Car spaces <input type="number" name="car_spaces" min="0" value="{{ listing.car_spaces if listing else '' }}"></label>
    <label>Land size (sqm) <input type="number" step="0.1" name="land_size_sqm" value="{{ listing.land_size_sqm if listing else '' }}"></label>
  </fieldset>

  <fieldset>
    <legend>Location &amp; commute</legend>
    <label>Nearest station <input name="nearest_station" value="{{ listing.nearest_station if listing else '' }}"></label>
    <label>Distance to station (m) <input type="number" name="distance_to_station_m" value="{{ listing.distance_to_station_m if listing else '' }}"></label>
    <label>Door-to-door commute to Flinders St (min) <input type="number" name="commute_to_flinders_min" value="{{ listing.commute_to_flinders_min if listing else '' }}"></label>
  </fieldset>

  <fieldset>
    <legend>Light &amp; aspect</legend>
    <label>Aspect
      <select name="aspect">
        {% set current_aspect = listing.aspect if listing else '' %}
        <option value="" {% if not current_aspect %}selected{% endif %}>Unknown</option>
        {% for a in ['N','NE','E','SE','S','SW','W','NW'] %}
          <option value="{{ a }}" {% if current_aspect == a %}selected{% endif %}>{{ a }}</option>
        {% endfor %}
      </select>
    </label>
    <label><input type="checkbox" name="full_of_light" {% if listing and listing.full_of_light %}checked{% endif %}> Full of light (even if not north facing)</label>
  </fieldset>

  <fieldset>
    <legend>Process</legend>
    <label>Status
      <select name="status">
        {% set current_status = listing.status if listing else 'watching' %}
        {% for choice in status_choices %}
          <option value="{{ choice }}" {% if current_status == choice %}selected{% endif %}>{{ choice.replace('_', ' ') }}</option>
        {% endfor %}
      </select>
    </label>
    <label>Inspection date <input type="date" name="inspection_date" value="{{ listing.inspection_date if listing else '' }}"></label>
    <label>Agent name <input name="agent_name" value="{{ listing.agent_name if listing else '' }}"></label>
    <label>Agent phone <input name="agent_phone" value="{{ listing.agent_phone if listing else '' }}"></label>
    <label>Notes <textarea name="notes" rows="4">{{ listing.notes if listing else '' }}</textarea></label>
  </fieldset>

  <button type="submit">Save</button>
</form>
{% endblock %}
